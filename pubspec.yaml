name: erick
description: Gweno Editor Pro - Professional AI Photo Editor for Android
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_storage: ^11.7.7
  firebase_analytics: ^10.10.7
  firebase_crashlytics: ^3.5.7
  cloud_firestore: ^4.17.5

  # Image processing
  image: ^4.2.0
  image_picker: ^1.1.2
  photo_manager: ^3.3.0
  image_gallery_saver: ^2.0.3
  image_cropper: ^5.0.1
  flutter_image_compress: ^2.2.0

  # Permissions
  permission_handler: ^11.3.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # UI components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.1.0
  flutter_colorpicker: ^1.1.0
  dotted_border: ^2.1.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1

  # Utilities
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  connectivity_plus: ^6.0.5
  intl: ^0.19.0
  uuid: ^4.4.2
  crypto: ^3.0.3
  path: ^1.9.0
  collection: ^1.18.0
  rxdart: ^0.27.7
  freezed_annotation: ^2.4.2
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dio: ^5.7.0
  flutter_cache_manager: ^3.4.1

  # In-app purchase
  in_app_purchase: ^3.2.0

  # Drawing / creative
  flutter_painter_v2: ^2.1.0

  # Social share
  social_share: ^2.3.1

  # Fonts
  google_fonts: ^6.2.1

  # Animation
  animate_do: ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
    - assets/filters/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
